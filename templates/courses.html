<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduHub — Courses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  {% include 'partials/header.html' %}
  <div class="app-body">
    {% include 'partials/sidebar.html' %}
    <main class="main-content">
      <div class="page-hero">
        <h1 class="page-heading">Courses</h1>
        <p class="page-sub">Discover undergraduate and postgraduate programmes at India's top institutions.</p>
      </div>
      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search courses, colleges…" onkeydown="if(event.key==='Enter')loadData()" />
        <select id="fieldFilter" onchange="loadData()">
          <option value="">All Fields</option>
        </select>
        <button class="btn-search" onclick="loadData()">Search</button>
        <button class="btn-clear"  onclick="clearFilters()">Clear</button>
      </div>
      <div id="cardsGrid" class="cards-grid"></div>
    </main>
  </div>
  <script src="/static/js/main.js"></script>
  <script src="/static/js/courses.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>setActivePage('courses'));</script>
</body>
</html>
